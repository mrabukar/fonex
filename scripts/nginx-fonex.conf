# Production nginx config for the Fonex monorepo.
# Install: sudo cp scripts/nginx-fonex.conf /etc/nginx/sites-available/fonex
#          sudo nginx -t && sudo systemctl reload nginx

server {
  listen 443 ssl;
  server_name fonexsupply.com www.fonexsupply.com;

  ssl_certificate /etc/letsencrypt/live/fonexsupply.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/fonexsupply.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name fonexsupply.com www.fonexsupply.com;
  return 301 https://$host$request_uri;
}
